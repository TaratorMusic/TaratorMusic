<main>
	<div class="drag-area" style="display: flex; flex-direction: row; height: 10vw">
		<img id="taratorLogo" src="../assets/tarator16_icon.png" style="width: 10vw; height: 10vw" />
		<div id="song-name">TaratorMusic</div>
		<div id="minimise-button" class="no-drag">&#x2212;</div>
		<div id="close-button" class="no-drag">&times;</div>
	</div>

	<div id="thumbnail" class="drag-area"></div>

	<div class="controls" style="display: flex; flex-direction: row; height: 10vw">
		<div id="previous-button" class="no-drag"></div>
		<div id="pauseplay-button" class="no-drag"></div>
		<div id="next-button" class="no-drag"></div>
		<div style="width: 70vw; height: 10vw" id="song-progress"></div>
	</div>
</main>

<style>
	* {
		margin: 0;
		padding: 0;
		color: white;
		text-align: center;
	}

	main {
		background-color: #333;
	}

	.drag-area {
		-webkit-app-region: drag;
	}

	.no-drag {
		-webkit-app-region: no-drag;
		cursor: pointer;
	}

	#song-name {
		width: 70vw;
		height: 10vw;
		overflow: hidden;
		white-space: nowrap;
		text-overflow: ellipsis;
		font-size: 5vw;
		align-items: center;
		padding: 2.5vw 2vw 0 2vw;
	}

	#thumbnail {
		width: 100vw;
		height: calc(100vh - 20vw);
		background-size: cover;
		background-position: center;
	}

	#close-button,
	#minimise-button {
		width: 10vw;
		height: 10vw;
		display: flex;
		justify-content: center;
		align-items: center;
	}

	#previous-button,
	#pauseplay-button,
	#next-button {
		width: 10vw;
		height: 10vw;
		background-size: contain;
		background-repeat: no-repeat;
		background-position: center;
	}
</style>

<script>
	const { ipcRenderer } = require("electron");

	let currentThumbnail; // To prevent reupdating the image every second

	document.getElementById("previous-button").style.backgroundImage = "url(../assets/previous.svg)";
	document.getElementById("next-button").style.backgroundImage = "url(../assets/next.svg)";
	document.getElementById("pauseplay-button").style.backgroundImage = "url(../assets/play.svg)";

	ipcRenderer.on("miniplayer-update", (_, data) => {
		if (data.songName != undefined) document.getElementById("song-name").innerText = data.songName;
		if (data.progress != undefined) document.getElementById("song-progress").innerText = data.progress;
		if (data.isPlaying != undefined) document.getElementById("pauseplay-button").style.backgroundImage = data.isPlaying ? "url(../assets/pause.svg)" : "url(../assets/play.svg)";
		if (data.thumbnail != undefined && data.thumbnail != currentThumbnail) {
			currentThumbnail = data.thumbnail;
			document.getElementById("thumbnail").style.backgroundImage = `url(${currentThumbnail})`;
		}
	});

	document.getElementById("previous-button").onclick = () => ipcRenderer.send("miniplayer-previous");
	document.getElementById("pauseplay-button").onclick = () => ipcRenderer.send("miniplayer-playpause");
	document.getElementById("next-button").onclick = () => ipcRenderer.send("miniplayer-next");
	document.getElementById("close-button").onclick = () => ipcRenderer.send("miniplayer-close");
	document.getElementById("minimise-button").onclick = () => ipcRenderer.send("miniplayer-minimize");
</script>
